<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>足球视频一键剪辑</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <h1 class="title">足球视频一键剪辑</h1>
        <div class="subtitle">上传 → 识别 → 剪辑 → 一键导出</div>
      </header>

      <section id="uploadView" class="card">
        <h2>上传视频</h2>
        <div class="upload-row">
          <input id="fileInput" class="file-input" type="file" accept="video/*" />
          <button id="uploadBtn" class="btn primary">上传并识别</button>
        </div>
        <div class="progress-row">
          <div class="progress-bar">
            <div id="uploadProgress" class="progress-inner" style="width: 0%"></div>
          </div>
          <div id="uploadStatus" class="muted">等待上传</div>
        </div>
      </section>

      <section id="editorView" class="card hidden">
        <div class="editor-head">
          <h2>剪辑</h2>
          <div class="editor-meta">
            <span id="jobText" class="muted">job: -</span>
            <button id="backToUpload" class="btn">返回上传</button>
          </div>
        </div>

        <div class="editor-grid">
          <div class="preview-card">
            <div class="preview-toolbar">
              <button id="addSegmentBtn" class="btn">以当前时间新增片段</button>
            </div>
            <div class="preview-area">
              <video id="video" class="video" controls playsinline></video>
            </div>

            <div class="timeline-wrap">
              <div id="timeline" class="timeline"></div>
              <div class="timeline-hint muted">拖动片段可移动，拖动两端可调整，点击空白处跳转视频时间</div>
            </div>
          </div>

          <div class="side-card">
            <h3>片段标记</h3>
            <div id="segmentsList" class="segments-list"></div>

            <h3>导出</h3>
            <div class="export-row">
              <label class="field">
                <span>分辨率</span>
                <select id="resolution" class="select">
                  <option value="source">源分辨率</option>
                  <option value="720p">720p</option>
                  <option value="1080p">1080p</option>
                </select>
              </label>
            </div>
            <div class="export-actions">
              <button id="saveSegmentsBtn" class="btn">保存片段</button>
              <button id="exportBtn" class="btn primary">一键导出</button>
            </div>
            <div id="exportStatus" class="muted">未开始导出</div>
            <a id="downloadLink" class="download-link hidden" href="#" target="_blank" rel="noreferrer">下载导出视频</a>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
